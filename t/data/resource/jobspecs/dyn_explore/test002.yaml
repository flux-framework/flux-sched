version: 9999
resources:
  - type: node
    count: 2
    with:
      - type: slot
        count: 1
        label: default
        with:
          - type: socket
            count: 1
            with:
              - type: core
                count: 8

# Partially specified jobspec rooted at node: the requested counts reach the
# cluster level only via resolve()/merge() through pass-through rack vertices.
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: default
    count:
      per_slot: 1
