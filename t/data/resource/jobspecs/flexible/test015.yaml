version: 9999
resources:
  - type: cluster
    count: 1
    with:
      - type: node
        count: 1
        with:
          - type: socket
            count: 1
            with:
              - type: xor_slot
                count: 1
                label: a1
                with:
                  - type: core
                    count: 8
              - type: xor_slot
                count: 1
                label: a2
                with:
                  - type: core
                    count: 10
  - type: slot
    count: 1
    label: default
    with:
      - type: xor_slot
        count: 1
        label: s1
        with:
          - type: core
            count: 8
      - type: xor_slot
        count: 1
        label: s2
        with:
          - type: core
            count: 10
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: default
    count:
      per_slot: 1
