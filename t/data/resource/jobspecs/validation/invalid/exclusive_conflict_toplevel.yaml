version: 9999
# Invalid: top-level resource explicitly sets exclusive: true but immediate child sets exclusive: false
resources:
  - type: slot
    count: 1
    label: testslot
    exclusive: true
    with:
      - type: node
        count: 1
        exclusive: false
        with:
          - type: core
            count: 2
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: testslot
    count:
      per_slot: 1
