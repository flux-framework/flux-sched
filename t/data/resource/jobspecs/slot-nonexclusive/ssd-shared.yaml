version: 9999
# Exclusivity here follows the inheritance rules (see "Exclusivity of
# Resources Under a Slot" in resource/utilities/README.md): chassis, node,
# and core are unspecified so they inherit exclusive access from the slot;
# ssd explicitly overrides with exclusive: false, making only the ssd
# subtree shareable without affecting its siblings.
resources:
  - type: slot
    count: 1
    label: testslot
    with:
      - type: chassis
        count: 1
        with:
          - type: ssd
            count: 3
            exclusive: false
          - type: node
            count: 1
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: testslot
    count:
      per_slot: 1
