version: 9999
resources:
  - type: slot
    count: 3
    label: default
    with:
    - type: ssd
      count: 1
      exclusive: false
    - type: node
      count: 1
      exclusive: false
      with:
      - type: slot
        label: task
        count: 1
        with:
        - type: core
          count: 1
# a comment
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
