version: 9999
# Test non-pooled shared GPU with multiple exclusive cores
# Request 1 GPU (shared) + 10 cores (exclusive) per socket
# With 18 cores per socket, we can fit at most 1 full request per socket
resources:
  - type: node
    count: 1
    with:
      - type: slot
        count: 1
        label: task
        with:
          - type: socket
            count: 1
            with:
              - type: gpu
                count: 1
                exclusive: false
              - type: core
                count: 10
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
