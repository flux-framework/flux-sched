version: 9999
# Single slot with a 500 GiB pooled SSD + node. 500 GiB exceeds half of a 793 GiB
# SSD, so floor(793/500)=1 allocation fits per SSD: 4 SSDs => 4 successful
# allocations, the 5th fails. Allocated repeatedly to verify the floor and that
# the match-output indentation is stable across allocations.
resources:
  - type: slot
    count: 1
    label: default
    exclusive: false
    with:
      - type: ssd
        count: 500
        unit: GiB
        exclusive: false
      - type: node
        count: 1
        exclusive: false
        with:
          - type: slot
            label: task
            count: 1
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
