version: 9999
# Test non-pooled shared resources (GPUs without units, explicit exclusive:false)
# Request GPU with exclusive:false and core with default exclusive (true)
resources:
  - type: node
    count: 1
    with:
      - type: slot
        count: 1
        label: task
        with:
          - type: socket
            count: 1
            with:
              - type: gpu
                count: 1
                exclusive: false
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
