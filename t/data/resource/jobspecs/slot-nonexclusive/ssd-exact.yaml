version: 9999
resources:
  - type: chassis
    count: 1
    with:
      - type: ssd
        count: 2
        exclusive: false
      - type: node
        count: 1
        with:
          - type: core
            count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    count:
      per_slot: 1
