version: 9999
resources:
  - type: slot
    count: 1
    label: default
    with:
      - type: chassis
        count: 1
        with:
          - type: ssd
            count: 2
            # implicit exclusive: true (no override)
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: default
    count:
      per_slot: 1
