version: 9999
resources:
  - type: slot
    count: 1
    label: testslot
    with:
      - type: chassis
        count: 1
        with:
          - type: ssd
            count: 3
            # exclusive: true is implicit (inherited from slot)
          - type: node
            count: 1
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: testslot
    count:
      per_slot: 1
