version: 9999
# Single slot with a 396 GB pooled SSD + node. 396 GB is just under half of a 793 GiB
# SSD, so floor(793/396)=2 allocations fit per SSD (2x396=792<=793): 4 SSDs => 8
# successful allocations, the 9th fails. Verifies the per-SSD floor of 2 and that
# the match-output indentation is stable across allocations.
resources:
  - type: slot
    count: 1
    label: default
    exclusive: false
    with:
      - type: ssd
        count: 396
        unit: GB
        exclusive: false
      - type: node
        count: 1
        exclusive: false
        with:
          - type: slot
            label: task
            count: 1
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
