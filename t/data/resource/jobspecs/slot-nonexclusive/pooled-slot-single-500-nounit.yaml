version: 9999
# Same as pooled-slot-single-500.yaml but the jobspec OMITS the unit: pooled
# classification is authoritative from the graph vertex (which has unit GiB),
# not the jobspec. 500 exceeds half of a 793 GiB SSD, so 4 SSDs => 4
# successful allocations. The 5th must fail even though 4 x 293 = 1172 GiB
# remains in total: a pooled draw must fit within a single vertex's pool, so
# fragmented capacity is never combined across vertices.
resources:
  - type: slot
    count: 1
    label: default
    exclusive: false
    with:
      - type: ssd
        count: 500
        exclusive: false
      - type: node
        count: 1
        exclusive: false
        with:
          - type: slot
            label: task
            count: 1
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
