version: 9999
# 7 slots, each pooled 5 GB SSD + 1 node. With only 4 SSD vertices, slots
# share SSDs by capacity. Expect 4 SSDs serving 7 slots (10/10/10/5), 35 GB
# total, 7 nodes.
resources:
  - type: slot
    count: 7
    label: default
    exclusive: false
    with:
      - type: ssd
        count: 5
        unit: GB
        exclusive: false
      - type: node
        count: 1
        exclusive: false
        with:
          - type: slot
            label: task
            count: 1
            exclusive: false
            with:
              - type: core
                count: 1
attributes:
  system:
    duration: 3600
tasks:
  - command: [ "app" ]
    slot: task
    count:
      per_slot: 1
